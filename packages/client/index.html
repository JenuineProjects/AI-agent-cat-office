<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cat Office</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    #app { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    #game-wrapper { position: relative; display: inline-block; overflow: visible; }
    #game-canvas { image-rendering: pixelated; image-rendering: crisp-edges; display: block; margin: 0 auto; }
    #ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; }
    #ui-overlay > * { pointer-events: auto; }
  </style>
</head>
<body>
  <div id="app">
    <div id="game-wrapper">
      <canvas id="game-canvas"></canvas>
      <div id="ui-overlay"></div>
    </div>
  </div>
  <script type="module" src="/src/index.ts"></script>
</body>
</html>
